        .data-table .channel-cell { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 14px; font-weight: 700; padding: 8px 6px; letter-spacing: 0.5px; }

    <script>
        const weeks = ['06-01', '06-08', '06-15', '06-22', '06-29', '07-06'];
        const channels = ['直播间', '1+12', '0+12', '保', '筹', '续保', '投放均分'];
        const colors = ['#48bb78', '#38a169', '#ed8936', '#4299e1', '#667eea', '#f56565', '#718096'];
        const reasonColors = {
            '保司退保': '#ed8936',
            '微信投诉': '#f56565',
            '用户风险': '#9f7aea',
            '订单风险': '#667eea',
            '客服操作': '#ecc94b'
        };
        const changeColor = '#4a5568';

        // ========== 数据导入功能 ==========
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusEl = document.getElementById('fileStatus');
            statusEl.textContent = '正在解析...';
            statusEl.className = 'file-status';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    const result = parseExcelData(jsonData);
                    if (result) {
                        // 更新全局数据
                        weeks.length = 0;
                        weeks.push(...result.weeks);
                        channels.length = 0;
                        channels.push(...result.channels);
                        Object.keys(rawData).forEach(k => delete rawData[k]);
                        Object.assign(rawData, result.data);

                        // 更新日期显示
                        updateDateDisplay();

                        // 刷新所有模块
                        refreshAllModules();

                        statusEl.textContent = `✓ 导入成功！数据周期：${weeks[0]} - ${weeks[weeks.length-1]}（${weeks.length}周）`;
                        statusEl.className = 'file-status success';
                    } else {
                        statusEl.textContent = '✗ 数据格式不正确，请检查Excel格式';
                        statusEl.className = 'file-status error';
                    }
                } catch (err) {
                    console.error(err);
                    statusEl.textContent = '✗ 文件解析失败：' + err.message;
                    statusEl.className = 'file-status error';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseExcelData(jsonData) {
            // 查找渠道列的位置（第3列，索引2）
            const channelColIdx = 2;
            const dateColIdx = 3;

            // 收集所有渠道和周数据
            const channelData = {};
            const weekSet = new Set();
            const channelList = [];

            // 指标列映射（列索引 -> 数据key）
            const colMapping = {
                4: '承保量',
                5: '工单创建量',
                6: '建单率',
                7: '退保订单量',
                8: '进入退保挽单订单量',
                9: '入库率',
                10: '保司退保未建单占比',
                11: '微信投诉未建单占比',
                12: '用户高风险未建单占比',
                13: '订单高风险未建单占比',
                14: '客服操作未建单占比',
                15: '退保咨询单量',
                16: 't0拦截率',
                17: 't7拦截率',
                18: 't35续费率'
            };

            let currentChannel = null;

            for (let i = 0; i < jsonData.length; i++) {
                const row = jsonData[i];
                if (!row || row.length < 4) continue;

                const channelVal = String(row[channelColIdx] || '').trim();
                const dateVal = row[dateColIdx];

                // 判断是否是渠道行
                if (['直播间', '1+12', '0+12', '保', '筹', '续保', '投放均分'].includes(channelVal)) {
                    currentChannel = channelVal;
                    if (!channelData[currentChannel]) {
                        channelData[currentChannel] = {};
                        channelList.push(currentChannel);
                        // 初始化所有指标数组
                        Object.values(colMapping).forEach(key => {
                            channelData[currentChannel][key] = [];
                        });
                    }
                } else if (currentChannel && dateVal) {
                    // 解析日期
                    const dateStr = String(dateVal);
                    let weekKey = null;
                    if (dateStr.includes('2026-')) {
                        const dateMatch = dateStr.match(/(\d{4}-\d{2}-\d{2})/);
                        if (dateMatch) {
                            const d = dateMatch[1];
                            weekKey = d.substring(5).replace('-', '-');
                            weekSet.add(weekKey);
                        }
                    }

                    // 读取各列数据
                    Object.entries(colMapping).forEach(([colIdx, key]) => {
                        const val = row[parseInt(colIdx)];
                        let parsedVal = null;

                        if (val === '/' || val === undefined || val === null) {
                            parsedVal = null;
                        } else if (typeof val === 'number') {
                            // 检查是否是百分比（0-1之间的小数）
                            if (key.includes('率') || key.includes('占比')) {
                                if (val > 0 && val < 1) {
                                    parsedVal = val * 100;
                                } else {
                                    parsedVal = val;
                                }
                            } else {
                                parsedVal = val;
                            }
                        } else if (typeof val === 'string') {
                            const numVal = parseFloat(val);
                            if (!isNaN(numVal)) {
                                if (key.includes('率') || key.includes('占比')) {
                                    if (numVal > 0 && numVal < 1) {
                                        parsedVal = numVal * 100;
                                    } else {
                                        parsedVal = numVal;
                                    }
                                } else {
                                    parsedVal = numVal;
                                }
                            }
                        }

                        if (channelData[currentChannel][key]) {
                            channelData[currentChannel][key].push(parsedVal);
                        }
                    });
                }
            }

            if (channelList.length === 0) {
                return null;
            }

            // 排序周（从旧到新）
            const sortedWeeks = Array.from(weekSet).sort();

            return {
                weeks: sortedWeeks,
                channels: channelList,
                data: channelData
            };
        }

        function updateDateDisplay() {
            const dateEl = document.querySelector('.header .date');
            if (weeks.length > 0) {
                const startWeek = weeks[0];
                const endWeek = weeks[weeks.length - 1];
                dateEl.textContent = `数据周期：2026年${startWeek.substring(0,2)}月${startWeek.substring(3)}日 - ${endWeek.substring(0,2)}月${endWeek.substring(3)}日（${weeks.length}周）`;
            }
        }

        function renderMetricCards() {

            const minRate = Math.min(...latestRates);

        // 异常分析
        function updateAnomaly() {
            const mode = document.getElementById('anomalyMode').value;
            const weekSelect = document.getElementById('anomalyWeek');
            weekSelect.style.display = mode === 'week' ? 'inline-block' : 'none';

            const container = document.getElementById('anomalyContent');
            let html = '';
            const insights = [];

            // 评估标准
            const thresholds = {
                入库率: { high: 65, low: 50 },
                t0拦截率: { high: 75, low: 60 },
                t7拦截率: { high: 55, low: 40 },
                建单率: { high: 30, low: 15 }
            };

            if (mode === 'all') {
                const weekCount = weeks.length;
                channels.forEach(ch => {
                    const d = rawData[ch];
                    const avgWarehouse = d.入库率.reduce((a, b) => a + b, 0) / d.入库率.length;
                    const avgT0 = d.t0拦截率.reduce((a, b) => a + b, 0) / d.t0拦截率.length;
                    const avgT7 = d.t7拦截率.reduce((a, b) => a + b, 0) / d.t7拦截率.length;
                    const validBuild = d.建单率.filter(v => v !== null);
                    const avgBuild = validBuild.length > 0 ? validBuild.reduce((a, b) => a + b, 0) / validBuild.length : null;

                    const firstWarehouse = d.入库率[0];
                    const lastWarehouse = d.入库率[weekCount - 1];
                    const warehouseTrend = lastWarehouse - firstWarehouse;

                    let issues = [];
                    let suggestions = [];
                    let trends = [];

                    if (avgWarehouse < thresholds.入库率.low) {
                        issues.push(`平均入库率极低(${avgWarehouse.toFixed(1)}%)`);
                        suggestions.push('优先优化入库流程，提高挽单成功率');
                    } else if (avgWarehouse < thresholds.入库率.high) {
                        issues.push(`平均入库率偏低(${avgWarehouse.toFixed(1)}%)`);
                    }

                    if (warehouseTrend > 5) {
                        trends.push(`入库率上升${warehouseTrend.toFixed(1)}个百分点`);
                    } else if (warehouseTrend < -5) {
                        trends.push(`入库率下降${Math.abs(warehouseTrend).toFixed(1)}个百分点`);
                        suggestions.push('入库率持续下降，需深入分析原因');
                    }

                    if (avgT0 < thresholds.t0拦截率.low) {
                        issues.push(`T0拦截率偏低(${avgT0.toFixed(1)}%)`);
                        suggestions.push('优化T0挽单话术，提高首次触达效果');
                    }
                    if (avgT7 < thresholds.t7拦截率.low) {
                        issues.push(`T7拦截率偏低(${avgT7.toFixed(1)}%)`);
                        suggestions.push('加强周内跟进，提升T7转化');
                    }

                    if (avgBuild && avgBuild > thresholds.建单率.high) {
                        issues.push(`平均建单率偏高(${avgBuild.toFixed(1)}%)`);
                        suggestions.push('用户主动退保意愿强，需分析渠道质量');
                    }

                    // 找主要损耗点（平均值）
                    const losses = [
                        { name: '保司退保未建单', value: d.保司退保未建单占比.reduce((a, b) => a + b, 0) / d.保司退保未建单占比.length },
                        { name: '微信投诉未建单', value: d.微信投诉未建单占比.reduce((a, b) => a + b, 0) / d.微信投诉未建单占比.length },
                        { name: '用户高风险未建单', value: d.用户高风险未建单占比.reduce((a, b) => a + b, 0) / d.用户高风险未建单占比.length },
                        { name: '客服操作未建单', value: d.客服操作未建单占比.reduce((a, b) => a + b, 0) / d.客服操作未建单占比.length }
                    ];
                    if (d['订单高风险未建单占比']) {
                        losses.push({ name: '订单风险未建单', value: d.订单高风险未建单占比.reduce((a, b) => a + b, 0) / d.订单高风险未建单占比.length });
                    }
                    losses.sort((a, b) => b.value - a.value);
                    const mainLoss = losses[0];

                    let boxClass = 'success';
                    if (avgWarehouse < thresholds.入库率.low) boxClass = 'danger';
                    else if (avgWarehouse < thresholds.入库率.high || issues.length > 0) boxClass = 'warning';

                    insights.push({
                        class: boxClass,
                        channel: ch,
                        avgWarehouse: avgWarehouse.toFixed(1),
                        issues: issues.length > 0 ? issues.join('，') : '整体表现良好',
                        mainLoss: `${mainLoss.name}(${mainLoss.value.toFixed(1)}%)`,
                        suggest: suggestions.length > 0 ? suggestions.join('；') : '保持当前表现',
                        trend: trends.length > 0 ? `，${trends.join('，')}` : ''
                    });
                });
            } else {
                // 指定周分析
                const weekIdx = parseInt(weekSelect.value);

                channels.forEach(ch => {
                    const d = rawData[ch];
                    const warehouseRate = d.入库率[weekIdx];
                    const t0Rate = d.t0拦截率[weekIdx];
                    const t7Rate = d.t7拦截率[weekIdx];
                    const buildRate = d.建单率[weekIdx];

                    let issues = [];
                    let suggestions = [];

                    if (warehouseRate < thresholds.入库率.low) {
                        issues.push(`入库率极低(${warehouseRate.toFixed(1)}%)`);
                        suggestions.push('优先优化入库流程，提高挽单成功率');
                    } else if (warehouseRate < thresholds.入库率.high) {
                        issues.push(`入库率偏低(${warehouseRate.toFixed(1)}%)`);
                    }

                    if (t0Rate < thresholds.t0拦截率.low) {
                        issues.push(`T0拦截率偏低(${t0Rate.toFixed(1)}%)`);
                        suggestions.push('优化T0挽单话术，提高首次触达效果');
                    }
                    if (t7Rate < thresholds.t7拦截率.low) {
                        issues.push(`T7拦截率偏低(${t7Rate.toFixed(1)}%)`);
                        suggestions.push('加强周内跟进，提升T7转化');
                    }

                    if (buildRate !== null && buildRate > thresholds.建单率.high) {
                        issues.push(`建单率偏高(${buildRate.toFixed(1)}%)`);
                        suggestions.push('用户主动退保意愿强，需分析渠道质量');
                    }

                    const losses = [
                        { name: '保司退保未建单', value: d.保司退保未建单占比[weekIdx] },
                        { name: '微信投诉未建单', value: d.微信投诉未建单占比[weekIdx] },
                        { name: '用户高风险未建单', value: d.用户高风险未建单占比[weekIdx] },
                        { name: '订单风险未建单', value: d.订单高风险未建单占比[weekIdx] },
                        { name: '客服操作未建单', value: d.客服操作未建单占比[weekIdx] }
                    ];
                    losses.sort((a, b) => b.value - a.value);
                    const mainLoss = losses[0];

                    let boxClass = 'success';
                    if (warehouseRate < thresholds.入库率.low) boxClass = 'danger';
                    else if (warehouseRate < thresholds.入库率.high || issues.length > 0) boxClass = 'warning';

                    insights.push({
                        class: boxClass,
                        channel: ch,
                        avgWarehouse: warehouseRate.toFixed(1),
                        issues: issues.length > 0 ? issues.join('，') : '表现良好',
                        mainLoss: `${mainLoss.name}(${mainLoss.value.toFixed(1)}%)`,
                        suggest: suggestions.length > 0 ? suggestions.join('；') : '保持当前表现',
                        trend: ''
                    });
                });
            }

            insights.sort((a, b) => {
                const order = { danger: 0, warning: 1, success: 2 };
                return order[a.class] - order[b.class];
            });

            if (insights.length === 0) {
                container.innerHTML = '<div class="insight-box success"><div class="title">✓ 整体表现良好</div><div class="detail">各渠道指标均在正常范围内</div></div>';
            } else {
                container.innerHTML = insights.map(item => `
                    <div class="insight-box ${item.class}">
                        <div class="title">${item.channel}：平均入库率${item.avgWarehouse}%${item.trend} <span class="channel-tag">主要未建单原因：${item.mainLoss}</span></div>
                        ${item.issues !== '表现良好' ? `<div class="detail">⚠️ ${item.issues}</div>` : ''}
                        <div class="suggest">💡 ${item.suggest}</div>
                    </div>
                `).join('');
            }
        }

        // 核心指标趋势
        function initTrendChart() {
            trendChart = echarts.init(document.getElementById('trendChart'));
            updateTrendChart();
        }

        function toggleTrendLine(type) {
            if (type === 'warehouse') showWarehouse = !showWarehouse;
            if (type === 'build') showBuild = !showBuild;
            if (type === 't0') showT0 = !showT0;
            if (type === 't7') showT7 = !showT7;
            updateTrendChart();
        }

        function updateTrendChart() {
            const series = [];

            const getChange = (dataArr, idx) => {
                if (idx === 0) return null;
                const prev = dataArr[idx - 1];
                const curr = dataArr[idx];
                if (prev === null || curr === null) return null;
                return curr - prev;
            };

            const getLabel = (channel, dataKey, dataIndex) => {
                const data = rawData[channel][dataKey];
                const baseVal = data[dataIndex];
                if (baseVal === null) return '';

                const change = getChange(data, dataIndex);
                if (change === null) return baseVal.toFixed(1);

                const changeStr = change >= 0 ? `+${change.toFixed(1)}` : change.toFixed(1);
                return `${baseVal.toFixed(1)}% (${changeStr})`;
            };

            if (showWarehouse) {
                channels.forEach((ch, i) => {
                    series.push({
                        name: ch,
                        type: 'line',
                        data: rawData[ch].入库率,
                        smooth: true,
                        symbolSize: 6,
                        itemStyle: { color: colors[i] },
                        label: { show: true, position: 'top', formatter: (params) => getLabel(ch, '入库率', params.dataIndex), fontSize: 10, color: changeColor }
                    });
                });
            }
            if (showBuild) {
                channels.forEach((ch, i) => {
                    const buildData = rawData[ch].建单率.map(v => v === null ? null : v);
                    series.push({
                        name: ch + '-建单率',
                        type: 'line',
                        data: buildData,
                        smooth: true,
                        lineStyle: { type: 'dashed', width: 2 },
                        symbolSize: 4,
                        itemStyle: { color: colors[i] },
                        label: { show: true, position: 'bottom', formatter: (params) => {
                            const data = rawData[ch].建单率;
                            const baseVal = data[params.dataIndex];
                            if (baseVal === null) return '';
                            const change = getChange(data, params.dataIndex);
                            if (change === null) return baseVal.toFixed(1);
                            const changeStr = change >= 0 ? `+${change.toFixed(1)}` : change.toFixed(1);
                            return `${baseVal.toFixed(1)}% (${changeStr})`;
                        }, fontSize: 10, color: changeColor }
                    });
                });
            }
            if (showT0) {
                channels.forEach((ch, i) => {
                    series.push({
                        name: ch + '-T0',
                        type: 'line',
                        data: rawData[ch].t0拦截率,
                        smooth: true,
                        symbolSize: 4,
                        lineStyle: { type: 'dashed', width: 2 },
                        itemStyle: { color: colors[i] },
                        label: { show: true, position: 'top', formatter: (params) => getLabel(ch, 't0拦截率', params.dataIndex), fontSize: 9, color: changeColor }
                    });
                });
            }
            if (showT7) {
                channels.forEach((ch, i) => {
                    series.push({
                        name: ch + '-T7',
                        type: 'line',
                        data: rawData[ch].t7拦截率,
                        smooth: true,
                        symbolSize: 4,
                        lineStyle: { type: 'dotted', width: 2 },
                        itemStyle: { color: colors[i] },
                        label: { show: true, position: 'bottom', formatter: (params) => getLabel(ch, 't7拦截率', params.dataIndex), fontSize: 9, color: changeColor }
                    });
                });
            }

            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { bottom: 0, textStyle: { fontSize: 11 }, selectedMode: 'single' },
                grid: { left: '3%', right: '12%', bottom: '10%', top: '10%', containLabel: true },
                xAxis: { type: 'category', data: weeks },
                yAxis: { type: 'value', min: 0, max: 100, axisLabel: { formatter: '{value}%' } },
                series: series
            });
        }

        // 入库率周环比分析
        function initCompareChart() {
            compareChart = echarts.init(document.getElementById('compareChart'));
            updateCompare();
        }

        function updateCompare() {
            const baseWeekIdx = parseInt(document.getElementById('baseWeek').value);
            const compareWeekIdx = parseInt(document.getElementById('compareWeek').value);
            const baseWeekName = weeks[baseWeekIdx];
            const compareWeekName = weeks[compareWeekIdx];

            const changes = channels.map(ch => {
                const baseVal = rawData[ch].入库率[baseWeekIdx];
                const compareVal = rawData[ch].入库率[compareWeekIdx];
                if (baseVal !== null && compareVal !== null) {
                    const changePct = ((compareVal - baseVal) / baseVal * 100).toFixed(1);
                    const changeAbs = (compareVal - baseVal).toFixed(1);
                    return { pct: changePct, abs: changeAbs, base: baseVal.toFixed(1), compare: compareVal.toFixed(1) };
                }
                return null;
            });

            compareChart.setOption({
                tooltip: { trigger: 'axis', formatter: function(params) {
                    const ch = params[0].name;
                    const data = changes[channels.indexOf(ch)];
                    if (!data) return ch;
                    const sign = parseFloat(data.abs) >= 0 ? '+' : '';
                    return `${ch}<br/>${baseWeekName}: ${data.base}%<br/>${compareWeekName}: ${data.compare}%<br/>变化: ${sign}${data.abs}pp (${sign}${data.pct}%)`;
                }},
                grid: { left: '3%', right: '4%', bottom: '10%', top: '10%', containLabel: true },
                xAxis: { type: 'category', data: channels },
                yAxis: { type: 'value', axisLabel: { formatter: "{value}%" } },
                series: [{
                    type: 'bar',
                    data: changes.map(c => c ? parseFloat(c.pct) : null),
                    label: { show: true, position: 'top', formatter: (params) => {
                        const data = changes[params.dataIndex];
                        if (!data) return '';
                        const sign = parseFloat(data.abs) >= 0 ? '+' : '';
                        return `${sign}${data.abs}pp`;
                    }, fontSize: 10 },
                    itemStyle: { color: function(params) {
                        const data = changes[params.dataIndex];
                        if (!data) return '#a0aec0';
                        return parseFloat(data.abs) >= 0 ? '#48bb78' : '#f56565';
                    }}
                }]
            });

            const upCount = changes.filter(c => c && parseFloat(c.abs) > 3).length;
            const downCount = changes.filter(c => c && parseFloat(c.abs) < -3).length;
            const stableCount = changes.filter(c => c && Math.abs(parseFloat(c.abs)) <= 3).length;

            document.getElementById('compareCards').innerHTML = `
                <div class="compare-card">
                    <div class="label">基准周</div>
                    <div class="value">${baseWeekName}</div>
                </div>
                <div class="compare-card">
                    <div class="label">对比周</div>
                    <div class="value">${compareWeekName}</div>
                </div>
                <div class="compare-card">
                    <div class="label">显著上升</div>
                    <div class="value status-up">>3pp ${upCount}个</div>
                </div>
                <div class="compare-card">
                    <div class="label">显著下降</div>
                    <div class="value status-down">3pp ${downCount}个</div>
                </div>
                <div class="compare-card">
                    <div class="label">基本稳定</div>
                    <div class="value">±3pp ${stableCount}个</div>
                </div>
            `;
        }

        // 未建单原因趋势
        function initReasonChart() {
            reasonChart = echarts.init(document.getElementById('reasonChart'));
            const legendHtml = Object.entries(reasonColors).map(([name, color]) => `
                <div class="legend-item">
                    <div class="legend-color" style="background:${color}"></div>
                    <span>${name}</span>
                </div>
            `).join('');
            document.getElementById('reasonLegend').innerHTML = legendHtml;
            updateReasonChart();
        }

        function updateReasonChart() {
            const channel = document.getElementById('reasonChannel').value;
            const d = rawData[channel];
            const lastIdx = weeks.length - 1;

            const getChangeLabel = (dataArr, idx) => {
                if (idx === 0) return '';
                const prev = dataArr[idx - 1];
                const curr = dataArr[idx];
                const change = curr - prev;
                return change >= 0 ? `+${change.toFixed(1)}` : change.toFixed(1);
            };

            reasonChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { bottom: 0, textStyle: { fontSize: 11 }, data: Object.keys(reasonColors) },
                grid: { left: '3%', right: '12%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: { type: 'category', data: weeks },
                yAxis: { type: 'value', max: 35, axisLabel: { formatter: '{value}%' } },
                series: [
                    { name: '保司退保未建单', type: 'line', data: d.保司退保未建单占比, smooth: true, symbolSize: 6, itemStyle: { color: reasonColors['保司退保'] },
                      label: { show: true, position: 'top', formatter: () => getChangeLabel(d.保司退保未建单占比, lastIdx), fontSize: 9, color: changeColor }
                    },
                    { name: '微信投诉未建单', type: 'line', data: d.微信投诉未建单占比, smooth: true, symbolSize: 6, itemStyle: { color: reasonColors['微信投诉'] },
                      label: { show: true, position: 'top', formatter: (params) => params.data > 1 ? getChangeLabel(d.微信投诉未建单占比, params.dataIndex) : '', fontSize: 9, color: changeColor }
                    },
                    { name: '用户高风险未建单', type: 'line', data: d.用户高风险未建单占比, smooth: true, symbolSize: 6, itemStyle: { color: reasonColors['用户风险'] },
                      label: { show: false }
                    },
                    { name: '订单风险未建单', type: 'line', data: d.订单高风险未建单占比, smooth: true, symbolSize: 6, itemStyle: { color: reasonColors['订单风险'] },
                      label: { show: false }
                    },
                    { name: '客服操作未建单', type: 'line', data: d.客服操作未建单占比, smooth: true, symbolSize: 6, itemStyle: { color: reasonColors['客服操作'] },
                      label: { show: true, position: 'top', formatter: () => getChangeLabel(d.客服操作未建单占比, lastIdx), fontSize: 9, color: changeColor }
                    }
                ]
            });
        }

        // 完整数据表
        function renderFullTable() {
            const container = document.getElementById('fullTable');

            // 指标列表（按Excel顺序），带阈值设置
            const metrics = [
                { key: '承保量', name: '承保量', bg: '#ffffff', isPct: false },
                { key: '工单创建量', name: '工单创建量', bg: '#ffffff', isPct: false },
                { key: '建单率', name: '建单率', bg: '#fffaf0', isPct: true, high: 30, low: 15 },
                { key: '退保订单量', name: '退保订单量', bg: '#ffffff', isPct: false },
                { key: '进入退保挽单订单量', name: '进入退保挽单订单量', bg: '#ffffff', isPct: false },
                { key: '入库率', name: '入库率', bg: '#f0fff4', isPct: true, high: 70, low: 50 },
                { key: '保司退保未建单占比', name: '保司退保未建单', bg: '#fff5f5', isPct: true, high: 20, low: 3 },
                { key: '微信投诉未建单占比', name: '微信投诉未建单', bg: '#fff5f5', isPct: true, high: 15, low: 2 },
                { key: '用户高风险未建单占比', name: '用户风险未建单', bg: '#fff5f5', isPct: true, high: 8, low: 3 },
                { key: '订单高风险未建单占比', name: '订单风险未建单', bg: '#fff5f5', isPct: true, high: 10, low: 1 },
                { key: '客服操作未建单占比', name: '客服操作未建单', bg: '#fff5f5', isPct: true, high: 18, low: 10 },
                { key: '退保咨询单量', name: '退保咨询单量', bg: '#ffffff', isPct: false },
                { key: 't0拦截率', name: 'T0拦截率', bg: '#ebf8ff', isPct: true, high: 80, low: 60 },
                { key: 't7拦截率', name: 'T7拦截率', bg: '#ebf8ff', isPct: true, high: 65, low: 45 },
                { key: 't35续费率', name: 'T35续费率', bg: '#ebf8ff', isPct: true, high: 30, low: 5 }
            ];

            // 动态周顺序：从旧到新（日期从左到右变大）
            const weekCount = weeks.length;
            const weekOrder = Array.from({ length: weekCount }, (_, i) => i);
            const weekHeaders = weeks;

            let html = '<table class="data-table"><thead><tr>';
            html += '<th style="position:sticky;left:0;background:#f7fafc;z-index:3;">渠道</th>';
            html += '<th>指标</th>';
            weekHeaders.forEach(w => html += `<th>${w}</th>`);
            html += '<th>平均</th><th>较平均</th><th>较上周</th>';
            html += '</tr></thead><tbody>';

            channels.forEach(ch => {
                const d = rawData[ch];

                metrics.forEach((m, idx) => {
                    html += '<tr>';
                    if (idx === 0) {
                        html += `<td rowspan="${metrics.length}" class="channel-cell" style="position:sticky;left:0;z-index:2;">${ch}</td>`;
                    }
                    html += `<td style="font-weight:600;background:${m.bg};">${m.name}</td>`;

                    const data = d[m.key];
                    // 按照周顺序（从旧到新）输出数据
                    html += '<td style="background:' + m.bg + ';">' + weekOrder.map((i) => {
                        const v = data[i];
                        if (v === null || v === undefined) return '-';
                        if (m.isPct) {
                            const val = v.toFixed(1) + '%';
                            // 判断异常高低
                            if (m.high !== undefined && v >= m.high) return `<span class="pct-high">${val}</span>`;
                            if (m.low !== undefined && v <= m.low) return `<span class="pct-low">${val}</span>`;
                            return val;
                        }
                        return v;
                    }).join('</td><td style="background:' + m.bg + ';">') + '</td>';

                    // 计算平均和趋势
                    const validData = data.filter(v => v !== null && v !== undefined);
                    const avgVal = validData.length > 0 ? validData.reduce((a, b) => a + b, 0) / validData.length : null;
                    const latestIdx = weekCount - 1;
                    const prevIdx = weekCount - 2;
                    const latestVal = data[latestIdx];
                    const prevWeekVal = data[prevIdx];

                    // 较平均趋势
                    let avgChangeHtml = '-';
                    if (avgVal !== null && latestVal !== null) {
                        const avgCh = latestVal - avgVal;
                        if (m.isPct) {
                            avgChangeHtml = `<span class="${avgCh >= 0 ? 'status-up' : 'status-down'}">${avgCh >= 0 ? '+' : ''}${avgCh.toFixed(1)}pp</span>`;
                        } else {
                            avgChangeHtml = `<span class="${avgCh >= 0 ? 'status-up' : 'status-down'}">${avgCh >= 0 ? '+' : ''}${Math.round(avgCh)}</span>`;
                        }
                    }

                    // 较上周趋势
                    let weekChangeHtml = '-';
                    if (prevWeekVal !== null && latestVal !== null) {
                        const weekCh = latestVal - prevWeekVal;
                        if (m.isPct) {
                            weekChangeHtml = `<span class="${weekCh >= 0 ? 'status-up' : 'status-down'}">${weekCh >= 0 ? '+' : ''}${weekCh.toFixed(1)}pp</span>`;
                        } else {
                            weekChangeHtml = `<span class="${weekCh >= 0 ? 'status-up' : 'status-down'}">${weekCh >= 0 ? '+' : ''}${Math.round(weekCh)}</span>`;
                        }
                    }

                    html += `<td style="font-weight:600;">${avgVal !== null ? (m.isPct ? avgVal.toFixed(1) + '%' : Math.round(avgVal)) : '-'}</td>`;
                    html += `<td>${avgChangeHtml}</td>`;
                    html += `<td>${weekChangeHtml}</td>`;
                    html += '</tr>';
                });

                // 分隔行（colspan需要动态计算）
                const colspan = 3 + weekCount + 3;
                html += `<tr><td colspan="${colspan}" style="background:#e2e8f0;height:2px;padding:0;"></td></tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        window.addEventListener('load', init);
        window.addEventListener('resize', () => {
            if (trendChart) trendChart.resize();
            if (compareChart) compareChart.resize();
            if (reasonChart) reasonChart.resize();
        });
    </script>
</body>
</html>
